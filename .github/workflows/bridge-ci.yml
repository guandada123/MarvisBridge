# ============================================================
# MarvisBridge CI — v2.0 (Unified Standard)
# Phases: Lint (ruff + shellcheck) → Type Check → Test → Security
# ============================================================
name: MarvisBridge CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  COV_FAIL_UNDER: 65

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "requirements*.txt"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  lint:
    name: Lint (ruff + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "requirements*.txt"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check scripts/
      - name: Ruff format check
        run: ruff format --check scripts/
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"
          additional_files: "bridge/*.sh"
          severity: warning

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "requirements*.txt"
      - name: Install mypy
        run: pip install mypy
      - name: Type check
        run: |
          mypy bridge/ scripts/ \
            --ignore-missing-imports \
            --check-untyped-defs \
            --warn-return-any \
            --warn-redundant-casts || echo "::warning::mypy 发现类型提示问题（非阻塞）"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "requirements*.txt"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=bridge --cov=scripts \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COV_FAIL_UNDER }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "requirements*.txt"
      - name: Install scanners
        run: pip install bandit safety
      - name: Bandit (code-level scan)
        run: bandit -r scripts/ bridge/ -ll --skip B101,B310
      - name: Safety (dependency scan)
        run: safety check --full-report || true
      - name: Secret scan
        run: |
          if grep -rn "PRIVATE KEY\|-----BEGIN RSA\|-----BEGIN OPENSSH" scripts/ bridge/ 2>/dev/null; then
            echo "::error::Private key detected in source code"
            exit 1
          fi
          echo "No secrets found"
