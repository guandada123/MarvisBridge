name: MarvisBridge CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ────────────────────────────
  # Python: Ruff Lint + Format
  # ────────────────────────────
  lint:
    name: Lint (ruff + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check scripts/ --fix
      - name: Ruff format check
        run: ruff format --check scripts/
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"
          additional_files: "bridge/*.sh"
          severity: warning

  # ────────────────────────────
  # Unit Tests (pytest)
  # ────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ────────────────────────────
  # Security Scan (bandit)
  # ────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Bandit security scan
        run: bandit -r scripts/ -ll --skip B101
      - name: Check for private keys
        run: |
          if grep -rn "PRIVATE KEY\|-----BEGIN RSA\|-----BEGIN OPENSSH" scripts/ bridge/ 2>/dev/null; then
            echo "::error::Private key detected in source code"
            exit 1
          fi
          echo "No private keys found"
