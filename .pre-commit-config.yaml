# Pre-commit hooks — Marvis Bridge (任务桥接调度器)
# Install: pip install pre-commit && pre-commit install --hook-type commit-msg
# Run manually: pre-commit run --all-files

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Shell script checks
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: ^(bridge|scripts)/.*\.sh$

  # Python: ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Python: mypy (type check) — 非阻塞，主要检查脚本
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args:
          - --ignore-missing-imports
          - --explicit-package-bases
        files: ^scripts/.*\.py$
        pass_filenames: false

  # Conventional Commits 格式校验
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commits
        entry: python scripts/check-commit-msg.py
        language: python
        stages: [commit-msg]
        always_run: true
